; ============================================================================
; Connect Option A — Shared Tenant Router Custom Context for VitalPBX / Asterisk
;
; PASTE THIS INTO /etc/asterisk/extensions__60_custom.conf ON THE VITALPBX HOST
; (or any custom-context file included by the main dialplan). This is a
; ONE-TIME install per PBX instance. Adding new tenants afterwards does NOT
; require any further dialplan changes.
;
; What it does
;   • Every inbound route that Connect controls points at [connect-tenant-router]
;     (after setting one channel variable: __TENANT_SLUG).
;   • The router reads tenant-scoped runtime state from Asterisk's AstDB
;     (family: connect/t_<slug>) and routes the call to the correct
;     preconfigured destination for the current mode.
;   • Fallback: if any key is missing or empty, the call is sent to
;     [connect-default-fallback] which plays a safe announcement and hangs up
;     cleanly. Calls are never dropped silently.
;
; Runtime keys this context reads (all strings, all under connect/t_<slug>):
;   mode              — "business" | "afterhours" | "holiday" | "override"
;   dest_business     — "<context>,<exten>,<priority>" or ""
;   dest_afterhours   — "<context>,<exten>,<priority>" or ""
;   dest_holiday      — "<context>,<exten>,<priority>" or ""
;   dest_override     — "<context>,<exten>,<priority>" or ""
;   override_expires  — epoch seconds (0 = no expiry); advisory only, not
;                       required for routing (Connect clears `mode=override`
;                       when the override ends).
;
; Safety properties
;   • No HTTP, ARI, or CURL calls at call time — only two in-memory AstDB
;     reads per call.
;   • Tenant isolation: every DB() lookup is rooted at connect/t_<TENANT_SLUG>.
;     A tenant's AstDB family cannot be read via this context for any other
;     tenant unless an inbound route is explicitly misconfigured to set the
;     wrong slug.
;   • Idempotent: the context performs no mutations; it only reads and Goto's.
;
; Requirements on the VitalPBX side
;   • The `database` CLI family `connect/t_<slug>` is managed entirely by
;     Connect via AMI DBPut — do not edit it manually from asterisk CLI.
;   • Each destination string MUST point at a context+exten that already
;     exists in VitalPBX (e.g. an IVR's internal context, a voicemail box,
;     a queue, a ring group). Connect validates non-empty destinations at
;     publish time; the dialplan is the last line of defense.
; ============================================================================

[connect-tenant-router]
; Entry point. Expected channel variable: TENANT_SLUG (set by the inbound
; route before Goto'ing here). The pattern _X! matches any DNID so Connect
; can control all of the tenant's inbound routes with a single Goto.
exten => _X!,1,NoOp(Connect Option A router — tenant=${TENANT_SLUG} dnid=${EXTEN})
 same =>      n,GotoIf($["${TENANT_SLUG}" = ""]?missing_slug)
 same =>      n,Set(FAMILY=connect/t_${TENANT_SLUG})
 same =>      n,Set(MODE=${DB(${FAMILY}/mode)})
 same =>      n,GotoIf($["${MODE}" = ""]?fallback)
 same =>      n,Set(DEST=${DB(${FAMILY}/dest_${MODE})})
 same =>      n,GotoIf($["${DEST}" = ""]?fallback)
 same =>      n,NoOp(Connect routing tenant=${TENANT_SLUG} mode=${MODE} dest=${DEST})
 same =>      n,Goto(${DEST})
 ; --- fallback branches ---
 same =>      n(fallback),NoOp(Connect fallback — tenant=${TENANT_SLUG} mode='${MODE}' dest='${DEST}')
 same =>      n,Goto(connect-default-fallback,s,1)
 same =>      n(missing_slug),NoOp(Connect error: no TENANT_SLUG set on channel)
 same =>      n,Goto(connect-default-fallback,s,1)

; Catch-all for the 's' exten in case an inbound route sends us without a DNID.
exten => s,1,NoOp(Connect Option A router — tenant=${TENANT_SLUG} (no DNID))
 same =>    n,Goto(_X!,1)

; ----------------------------------------------------------------------------
; [connect-default-fallback]
; Played when:
;   • Connect has not yet published for this tenant (keys absent)
;   • The tenant has no active profile for the current mode
;   • Something unexpected left the destination blank
; Replace the Playback() target with a VitalPBX announcement recording if you
; want a branded message. The default here is a generic system prompt.
; ----------------------------------------------------------------------------

[connect-default-fallback]
exten => s,1,NoOp(Connect fallback — no Option A route configured for tenant ${TENANT_SLUG})
 same =>    n,Answer()
 same =>    n,Wait(1)
 same =>    n,Playback(vm-goodbye)
 same =>    n,Hangup()

; ============================================================================
; PHASE 2 — Connect-owned IVR menu
;
; Tenants that want Connect to control per-digit routing AND the greeting
; (e.g. different recording for business hours / after hours / holiday) point
; their inbound route at [connect-tenant-ivr] instead of [connect-tenant-router].
; Both entry points can coexist — pick per-tenant based on needs.
;
; [connect-tenant-ivr] runs the greeting → Background+WaitExten loop; digit
; handlers set OPT_DIGIT and jump to [connect-option-router] which looks up
; the per-digit destination in AstDB and Goto's it.
;
; Additional runtime keys this reads (under connect/t_<slug>):
;   active_prompt            — main greeting recording ref (e.g. "custom/acme_normal")
;   active_prompt_invalid    — played on invalid digit, then re-prompt (optional)
;   active_prompt_timeout    — played on WaitExten timeout, then re-prompt (optional)
;   timeout_seconds          — WaitExten timeout in seconds (default 7 if unset)
;   max_retries              — retries before falling through to fallback (default 3)
;   opt_0/dest .. opt_9/dest — "context,exten,priority" per digit (empty = unassigned)
;   opt_star/dest            — destination for the `*` key
;   opt_hash/dest            — destination for the `#` key
;   opt_<digit>/type         — metadata only, not consumed by dialplan
;
; Safety:
;   • Still only in-memory AstDB reads — one per field per call.
;   • Greeting/invalid/timeout prompts are optional; if empty the dialplan
;     plays a safe built-in and keeps prompting.
;   • Invalid digits and timeouts are bounded by max_retries; after that the
;     call falls through to [connect-default-fallback] instead of looping.
;   • Any destination that Goto()'s at a non-existent context lands on the
;     `t` timeout extension in this context which re-prompts — no crash.
; ============================================================================

[connect-tenant-ivr]
; Entry point for Connect-controlled IVR. Inbound Route sets __TENANT_SLUG.
exten => _X!,1,NoOp(Connect Phase 2 IVR — tenant=${TENANT_SLUG} dnid=${EXTEN})
 same =>      n,GotoIf($["${TENANT_SLUG}" = ""]?missing_slug)
 same =>      n,Set(FAMILY=connect/t_${TENANT_SLUG})
 same =>      n,Set(GREETING=${DB(${FAMILY}/active_prompt)})
 same =>      n,Set(INVALID_PROMPT=${DB(${FAMILY}/active_prompt_invalid)})
 same =>      n,Set(TIMEOUT_PROMPT=${DB(${FAMILY}/active_prompt_timeout)})
 same =>      n,Set(T=${DB(${FAMILY}/timeout_seconds)})
 same =>      n,Set(R_MAX=${DB(${FAMILY}/max_retries)})
 same =>      n,Set(T=${IF($[${LEN(${T})}>0]?${T}:7)})
 same =>      n,Set(R_MAX=${IF($[${LEN(${R_MAX})}>0]?${R_MAX}:3)})
 same =>      n,Set(RETRIES=0)
 same =>      n,Answer()
 same =>      n,Wait(1)
 ; --- main prompt loop ---
 same =>      n(prompt),GotoIf($["${GREETING}" = ""]?default_greet)
 same =>      n,Background(${GREETING})
 same =>      n,Goto(waitdigit)
 same =>      n(default_greet),Playback(vm-enter-num-to-call)
 same =>      n(waitdigit),WaitExten(${T})
 ; WaitExten falls through here only on timeout — digit handlers below jump
 ; to connect-option-router before we ever reach this line.
 same =>      n,Set(RETRIES=$[${RETRIES}+1])
 same =>      n,GotoIf($[${RETRIES} >= ${R_MAX}]?fallback)
 same =>      n,GotoIf($["${TIMEOUT_PROMPT}" = ""]?prompt)
 same =>      n,Background(${TIMEOUT_PROMPT})
 same =>      n,Goto(waitdigit)
 ; --- error branches ---
 same =>      n(fallback),Goto(connect-default-fallback,s,1)
 same =>      n(missing_slug),NoOp(Connect error: no TENANT_SLUG set on channel)
 same =>      n,Goto(connect-default-fallback,s,1)

; Catch-all for the 's' exten if an inbound route has no DNID.
exten => s,1,NoOp(Connect Phase 2 IVR — tenant=${TENANT_SLUG} (no DNID))
 same =>    n,Goto(_X!,1)

; Per-digit handlers. Each sets OPT_DIGIT and jumps to the shared resolver.
; Digits 0-9 map to their numeric string; * and # map to "star"/"hash" because
; AstDB keys can't safely contain those characters.
exten => 0,1,Set(OPT_DIGIT=0)
 same =>    n,Goto(connect-option-router,s,1)
exten => 1,1,Set(OPT_DIGIT=1)
 same =>    n,Goto(connect-option-router,s,1)
exten => 2,1,Set(OPT_DIGIT=2)
 same =>    n,Goto(connect-option-router,s,1)
exten => 3,1,Set(OPT_DIGIT=3)
 same =>    n,Goto(connect-option-router,s,1)
exten => 4,1,Set(OPT_DIGIT=4)
 same =>    n,Goto(connect-option-router,s,1)
exten => 5,1,Set(OPT_DIGIT=5)
 same =>    n,Goto(connect-option-router,s,1)
exten => 6,1,Set(OPT_DIGIT=6)
 same =>    n,Goto(connect-option-router,s,1)
exten => 7,1,Set(OPT_DIGIT=7)
 same =>    n,Goto(connect-option-router,s,1)
exten => 8,1,Set(OPT_DIGIT=8)
 same =>    n,Goto(connect-option-router,s,1)
exten => 9,1,Set(OPT_DIGIT=9)
 same =>    n,Goto(connect-option-router,s,1)
exten => *,1,Set(OPT_DIGIT=star)
 same =>    n,Goto(connect-option-router,s,1)
exten => #,1,Set(OPT_DIGIT=hash)
 same =>    n,Goto(connect-option-router,s,1)

; 'i' = invalid extension (DTMF didn't match any handler). Play invalid prompt
; (if configured) and re-enter the loop. If invalid prompt is empty we skip
; straight back to the main loop so the call doesn't go silent.
exten => i,1,NoOp(Connect IVR invalid digit — tenant=${TENANT_SLUG})
 same =>   n,Set(RETRIES=$[${RETRIES}+1])
 same =>   n,GotoIf($[${RETRIES} >= ${R_MAX}]?connect-default-fallback,s,1)
 same =>   n,GotoIf($["${INVALID_PROMPT}" = ""]?reprompt)
 same =>   n,Background(${INVALID_PROMPT})
 same =>   n(reprompt),Goto(connect-tenant-ivr,${EXTEN},prompt)

; 't' = timeout (handled inline in the main flow via WaitExten falling through,
; but provide this as a safety net if Asterisk routes a 't' here directly).
exten => t,1,Goto(connect-tenant-ivr,${EXTEN},prompt)

; ----------------------------------------------------------------------------
; [connect-option-router]
; Looks up opt_<digit>/dest in AstDB and Goto's it. Empty/missing digits land
; in connect-default-fallback so the call always terminates cleanly.
; ----------------------------------------------------------------------------

[connect-option-router]
exten => s,1,NoOp(Connect option router — tenant=${TENANT_SLUG} digit=${OPT_DIGIT})
 same =>    n,Set(OPT_DEST=${DB(connect/t_${TENANT_SLUG}/opt_${OPT_DIGIT}/dest)})
 same =>    n,GotoIf($["${OPT_DEST}" = ""]?fallback)
 same =>    n,NoOp(Connect option routing tenant=${TENANT_SLUG} digit=${OPT_DIGIT} dest=${OPT_DEST})
 same =>    n,Goto(${OPT_DEST})
 same =>    n(fallback),Goto(connect-default-fallback,s,1)
