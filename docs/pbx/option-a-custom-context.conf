; ============================================================================
; Connect Option A — Shared Tenant Router Custom Context for VitalPBX / Asterisk
;
; PASTE THIS INTO /etc/asterisk/extensions__60_custom.conf ON THE VITALPBX HOST
; (or any custom-context file included by the main dialplan). This is a
; ONE-TIME install per PBX instance. Adding new tenants afterwards does NOT
; require any further dialplan changes.
;
; What it does
;   • Every inbound route that Connect controls points at [connect-tenant-router]
;     (after setting one channel variable: __TENANT_SLUG).
;   • The router reads tenant-scoped runtime state from Asterisk's AstDB
;     (family: connect/t_<slug>) and routes the call to the correct
;     preconfigured destination for the current mode.
;   • Fallback: if any key is missing or empty, the call is sent to
;     [connect-default-fallback] which plays a safe announcement and hangs up
;     cleanly. Calls are never dropped silently.
;
; Runtime keys this context reads (all strings, all under connect/t_<slug>):
;   mode              — "business" | "afterhours" | "holiday" | "override"
;   dest_business     — "<context>,<exten>,<priority>" or ""
;   dest_afterhours   — "<context>,<exten>,<priority>" or ""
;   dest_holiday      — "<context>,<exten>,<priority>" or ""
;   dest_override     — "<context>,<exten>,<priority>" or ""
;   override_expires  — epoch seconds (0 = no expiry); advisory only, not
;                       required for routing (Connect clears `mode=override`
;                       when the override ends).
;   moh_class         — active Music-On-Hold class name (runtime alias read by
;                       every entry context; empty string = use PBX default MOH)
;   active_moh_class  — audit/display alias written by Connect; used as a
;                       fallback by this context for older publishes
;   hold_announce     — VitalPBX recording ref for queue hold announcement
;                       (empty = no announcement loop)
;   hold_repeat       — seconds between hold-announcement playbacks (default 30)
;
; Shared-entry DID map (new, for zero-PBX-edit DID onboarding). Written per-DID
; by Connect when a DidRouteMapping is published. Keys live under a separate
; family `connect/didmap/<e164>/` so they cannot leak into any tenant family:
;   connect/didmap/<e164>/tenant     — tenant slug this DID belongs to
;   connect/didmap/<e164>/profile_id — IvrRouteProfile id override (optional)
;   connect/didmap/<e164>/moh_class  — per-DID MOH class override (optional;
;                                      wins over tenant default when present)
;   connect/didmap/<e164>/hold_announce — per-DID hold announcement override
;   connect/didmap/<e164>/hold_repeat   — per-DID announcement interval
;
; Safety properties
;   • No HTTP, ARI, or CURL calls at call time — only two in-memory AstDB
;     reads per call.
;   • Tenant isolation: every DB() lookup is rooted at connect/t_<TENANT_SLUG>.
;     A tenant's AstDB family cannot be read via this context for any other
;     tenant unless an inbound route is explicitly misconfigured to set the
;     wrong slug.
;   • Idempotent: the context performs no mutations; it only reads and Goto's.
;
; Requirements on the VitalPBX side
;   • The `database` CLI family `connect/t_<slug>` is managed entirely by
;     Connect via AMI DBPut — do not edit it manually from asterisk CLI.
;   • Each destination string MUST point at a context+exten that already
;     exists in VitalPBX (e.g. an IVR's internal context, a voicemail box,
;     a queue, a ring group). Connect validates non-empty destinations at
;     publish time; the dialplan is the last line of defense.
; ============================================================================

[connect-tenant-router]
; Entry point. Expected channel variable: TENANT_SLUG (set by the inbound
; route before Goto'ing here). The pattern _X! matches any DNID so Connect
; can control all of the tenant's inbound routes with a single Goto.
exten => _X!,1,NoOp(Connect Option A router — tenant=${TENANT_SLUG} dnid=${EXTEN})
 same =>      n,GotoIf($["${TENANT_SLUG}" = ""]?missing_slug)
 ; DID-level override (shared-entry architecture): if Connect has published a
 ; didmap entry for this DNID, it wins over the channel-variable TENANT_SLUG
 ; so a single "any DID" inbound route can drive all tenants.
 same =>      n,Set(DID_TENANT=${DB(connect/didmap/${EXTEN}/tenant)})
 same =>      n,ExecIf($["${DID_TENANT}" != ""]?Set(TENANT_SLUG=${DID_TENANT}))
 same =>      n,Set(DID_MOH_CLASS=${DB(connect/didmap/${EXTEN}/moh_class)})
 same =>      n,Set(FAMILY=connect/t_${TENANT_SLUG})
 ; Per-tenant MOH class — applied to the channel so any downstream Queue/Dial
 ; with music-on-hold uses the class Connect has activated. Empty = PBX default.
 same =>      n,Set(MOH_CLASS=${DB(${FAMILY}/moh_class)})
 same =>      n,ExecIf($["${MOH_CLASS}" = ""]?Set(MOH_CLASS=${DB(${FAMILY}/active_moh_class)}))
 same =>      n,ExecIf($["${DID_MOH_CLASS}" != ""]?Set(MOH_CLASS=${DID_MOH_CLASS}))
 same =>      n,ExecIf($["${MOH_CLASS}" != ""]?Set(CHANNEL(musicclass)=${MOH_CLASS}))
 same =>      n,NoOp(Connect MOH resolved tenant=${TENANT_SLUG} did=${EXTEN} did_moh=${DID_MOH_CLASS} effective_moh=${MOH_CLASS} channel_moh=${CHANNEL(musicclass)})
 same =>      n,Set(MODE=${DB(${FAMILY}/mode)})
 same =>      n,GotoIf($["${MODE}" = ""]?fallback)
 same =>      n,Set(DEST=${DB(${FAMILY}/dest_${MODE})})
 same =>      n,GotoIf($["${DEST}" = ""]?fallback)
 same =>      n,NoOp(Connect routing tenant=${TENANT_SLUG} mode=${MODE} dest=${DEST} moh=${MOH_CLASS})
 same =>      n,Goto(${DEST})
 ; --- fallback branches ---
 same =>      n(fallback),NoOp(Connect fallback — tenant=${TENANT_SLUG} mode='${MODE}' dest='${DEST}')
 same =>      n,Goto(connect-default-fallback,s,1)
 same =>      n(missing_slug),NoOp(Connect error: no TENANT_SLUG set on channel)
 same =>      n,Goto(connect-default-fallback,s,1)

; Catch-all for the 's' exten in case an inbound route sends us without a DNID.
exten => s,1,NoOp(Connect Option A router — tenant=${TENANT_SLUG} (no DNID))
 same =>    n,Goto(_X!,1)

; ----------------------------------------------------------------------------
; [connect-default-fallback]
; Played when:
;   • Connect has not yet published for this tenant (keys absent)
;   • The tenant has no active profile for the current mode
;   • Something unexpected left the destination blank
; Replace the Playback() target with a VitalPBX announcement recording if you
; want a branded message. The default here is a generic system prompt.
; ----------------------------------------------------------------------------

[connect-default-fallback]
exten => s,1,NoOp(Connect fallback — no Option A route configured for tenant ${TENANT_SLUG})
 same =>    n,Answer()
 same =>    n,Wait(1)
 same =>    n,Playback(vm-goodbye)
 same =>    n,Hangup()

; ============================================================================
; PHASE 2 — Connect-owned IVR menu
;
; Tenants that want Connect to control per-digit routing AND the greeting
; (e.g. different recording for business hours / after hours / holiday) point
; their inbound route at [connect-tenant-ivr] instead of [connect-tenant-router].
; Both entry points can coexist — pick per-tenant based on needs.
;
; [connect-tenant-ivr] runs the greeting → Background+WaitExten loop; digit
; handlers set OPT_DIGIT and jump to [connect-option-router] which looks up
; the per-digit destination in AstDB and Goto's it.
;
; Additional runtime keys this reads (under connect/t_<slug>):
;   active_prompt            — main greeting recording ref (e.g. "custom/acme_normal")
;   active_prompt_invalid    — played on invalid digit, then re-prompt (optional)
;   active_prompt_timeout    — played on WaitExten timeout, then re-prompt (optional)
;   active_prompt_retry      — NEW (VitalPBX-parity): played instead of the main
;                              greeting on retry iterations (optional). Empty
;                              means "replay main greeting" — the old behavior.
;   timeout_seconds          — WaitExten timeout in seconds (default 7 if unset)
;   max_retries              — retries before falling through to fallback (default 3)
;   opt_0/dest .. opt_9/dest — "context,exten,priority" per digit (empty = unassigned)
;   opt_star/dest            — destination for the `*` key
;   opt_hash/dest            — destination for the `#` key
;   opt_<digit>/type         — metadata only, not consumed by dialplan
;
;   --- NEW (VitalPBX-parity, all OPTIONAL, all back-compat) ---
;   direct_dial              — "1" enables dial-by-extension during the IVR
;                              menu. Anything else (including empty) disables
;                              it → dialplan behaves exactly as pre-v2.
;   dest_invalid_type        — module type for the post-max-retries invalid
;                              destination (extension|queue|ring_group|…).
;                              Metadata only — dialplan uses dest_invalid.
;   dest_invalid             — "<context>,<exten>,<priority>" (for CEP-style
;                              modules) OR "+E164" for type=external_number.
;                              Empty = fall through to connect-default-fallback.
;   dest_timeout_type        — same, for WaitExten max-retries timeout branch.
;   dest_timeout             — same.
;
; Safety:
;   • Still only in-memory AstDB reads — one per field per call.
;   • Greeting/invalid/timeout prompts are optional; if empty the dialplan
;     plays a safe built-in and keeps prompting. (Connect publishes the
;     resolved PBX default — "pbx-invalid" / "vm-enter-num-to-call" — when
;     the admin hasn't picked a custom recording, so "empty" only happens
;     on a legacy tenant that pre-dates the v2 publish.)
;   • Invalid digits and timeouts are bounded by max_retries; after that the
;     call routes to dest_invalid / dest_timeout if set, otherwise falls
;     through to [connect-default-fallback] (pre-v2 behavior).
;   • Direct-dial is gated by the direct_dial flag so tenants that don't
;     want it get the old restricted-menu behavior.
; ============================================================================

[connect-tenant-ivr]
; Entry point for Connect-controlled IVR. Inbound Route sets __TENANT_SLUG.
exten => _X!,1,NoOp(Connect Phase 2 IVR — tenant=${TENANT_SLUG} dnid=${EXTEN})
 same =>      n,GotoIf($["${TENANT_SLUG}" = ""]?missing_slug)
 ; DID-level override: see [connect-tenant-router] header for details.
 same =>      n,Set(DID_TENANT=${DB(connect/didmap/${EXTEN}/tenant)})
 same =>      n,ExecIf($["${DID_TENANT}" != ""]?Set(TENANT_SLUG=${DID_TENANT}))
 same =>      n,Set(DID_MOH_CLASS=${DB(connect/didmap/${EXTEN}/moh_class)})
 same =>      n,Set(FAMILY=connect/t_${TENANT_SLUG})
 ; Apply active MOH class for this tenant (empty = PBX default).
 same =>      n,Set(MOH_CLASS=${DB(${FAMILY}/moh_class)})
 same =>      n,ExecIf($["${MOH_CLASS}" = ""]?Set(MOH_CLASS=${DB(${FAMILY}/active_moh_class)}))
 same =>      n,ExecIf($["${DID_MOH_CLASS}" != ""]?Set(MOH_CLASS=${DID_MOH_CLASS}))
 same =>      n,ExecIf($["${MOH_CLASS}" != ""]?Set(CHANNEL(musicclass)=${MOH_CLASS}))
 same =>      n,NoOp(Connect MOH resolved tenant=${TENANT_SLUG} did=${EXTEN} did_moh=${DID_MOH_CLASS} effective_moh=${MOH_CLASS} channel_moh=${CHANNEL(musicclass)})
 ; Publish hold-announcement state on the channel so downstream Queue wrappers
 ; that want to play periodic announcements can pick them up without another
 ; AstDB round-trip per loop iteration.
 same =>      n,Set(HOLD_ANNOUNCE=${DB(${FAMILY}/hold_announce)})
 same =>      n,Set(HOLD_REPEAT=${DB(${FAMILY}/hold_repeat)})
 same =>      n,Set(HOLD_REPEAT=${IF($[${LEN(${HOLD_REPEAT})}>0]?${HOLD_REPEAT}:30)})
 same =>      n,Set(GREETING=${DB(${FAMILY}/active_prompt)})
 same =>      n,Set(INVALID_PROMPT=${DB(${FAMILY}/active_prompt_invalid)})
 same =>      n,Set(TIMEOUT_PROMPT=${DB(${FAMILY}/active_prompt_timeout)})
 same =>      n,Set(RETRY_PROMPT=${DB(${FAMILY}/active_prompt_retry)})
 same =>      n,Set(T=${DB(${FAMILY}/timeout_seconds)})
 same =>      n,Set(R_MAX=${DB(${FAMILY}/max_retries)})
 same =>      n,Set(DIRECT_DIAL=${DB(${FAMILY}/direct_dial)})
 same =>      n,Set(T=${IF($[${LEN(${T})}>0]?${T}:7)})
 same =>      n,Set(R_MAX=${IF($[${LEN(${R_MAX})}>0]?${R_MAX}:3)})
 same =>      n,Set(RETRIES=0)
 same =>      n,Answer()
 same =>      n,Wait(1)
 ; --- main prompt loop ---
 ; On retry iterations, play RETRY_PROMPT if configured, else replay the
 ; main greeting so the behavior stays identical to pre-v2 dialplans.
 same =>      n(prompt),GotoIf($[${RETRIES} > 0 & ${LEN(${RETRY_PROMPT})} > 0]?play_retry)
 same =>      n,GotoIf($["${GREETING}" = ""]?default_greet)
 ; Defense-in-depth: if Connect's publish accepted a prompt ref that isn't on
 ; disk, Background() would silently skip and the caller hears dead-air for
 ; `T` seconds. STAT(e, …) returns "1" if the file exists and "0" otherwise.
 ; We probe the two formats VitalPBX writes by default (ulaw + wav); if
 ; neither is present we fall through to the stock default greeting so the
 ; caller always hears *something*. Publish-time validation in Connect
 ; blocks missing refs before they reach the dialplan — this line is the
 ; runtime safety net for drift (admin deleted the file from VitalPBX, a
 ; partial rollback, etc.).
 same =>      n,NoOp(Connect IVR greeting attempt tenant=${TENANT_SLUG} ref=${GREETING})
 same =>      n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${GREETING}.ulaw)}" = "1"]?play_greet)
 same =>      n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${GREETING}.wav)}" = "1"]?play_greet)
 same =>      n,NoOp(Connect IVR greeting file missing ref=${GREETING} — falling back to default)
 same =>      n,Goto(default_greet)
 same =>      n(play_greet),Background(${GREETING})
 same =>      n,Goto(waitdigit)
 same =>      n(play_retry),NoOp(Connect IVR retry prompt tenant=${TENANT_SLUG} ref=${RETRY_PROMPT})
 same =>      n,Background(${RETRY_PROMPT})
 same =>      n,Goto(waitdigit)
 ; DISTINCT fallback so operators can tell "Connect IVR took over but had no
 ; playable greeting" apart from "call went to the PBX's built-in DISA"
 ; (which also plays vm-enter-num-to-call). If you hear "one moment please"
 ; followed by silence, you're in the Connect dialplan — check AstDB
 ; active_prompt for the tenant. Keep `vm-enter-num-to-call` in the chain as
 ; a final safety so callers aren't left in total silence.
 same =>      n(default_greet),NoOp(Connect IVR default fallback — tenant=${TENANT_SLUG} ref-was=${GREETING})
 same =>      n,Playback(one-moment-please)
 same =>      n,Playback(vm-enter-num-to-call)
 same =>      n(waitdigit),WaitExten(${T})
 ; WaitExten falls through here only on timeout — digit handlers below jump
 ; to connect-option-router before we ever reach this line.
 same =>      n,Set(RETRIES=$[${RETRIES}+1])
 same =>      n,GotoIf($[${RETRIES} >= ${R_MAX}]?exhausted_timeout)
 same =>      n,GotoIf($["${TIMEOUT_PROMPT}" = ""]?prompt)
 same =>      n,NoOp(Connect IVR timeout prompt tenant=${TENANT_SLUG} ref=${TIMEOUT_PROMPT})
 ; Same drift-proofing as the main greeting — missing file falls back to
 ; re-prompting with the main greeting rather than playing silence.
 same =>      n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${TIMEOUT_PROMPT}.ulaw)}" = "1"]?play_timeout)
 same =>      n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${TIMEOUT_PROMPT}.wav)}" = "1"]?play_timeout)
 same =>      n,NoOp(Connect IVR timeout prompt missing ref=${TIMEOUT_PROMPT} — reprompting)
 same =>      n,Goto(prompt)
 same =>      n(play_timeout),Background(${TIMEOUT_PROMPT})
 same =>      n,Goto(waitdigit)
 ; --- exhaust branches ---
 same =>      n(exhausted_timeout),Set(EXIT_TYPE=${DB(${FAMILY}/dest_timeout_type)})
 same =>      n,Set(EXIT_DEST=${DB(${FAMILY}/dest_timeout)})
 same =>      n,GotoIf($["${EXIT_DEST}" = ""]?fallback)
 same =>      n,NoOp(IVR exhausted on timeout — routing tenant=${TENANT_SLUG} type=${EXIT_TYPE} dest=${EXIT_DEST})
 same =>      n,Goto(connect-exit-router,s,1)
 same =>      n(fallback),Goto(connect-default-fallback,s,1)
 same =>      n(missing_slug),NoOp(Connect error: no TENANT_SLUG set on channel)
 same =>      n,Goto(connect-default-fallback,s,1)

; Catch-all for the 's' exten if an inbound route has no DNID.
exten => s,1,NoOp(Connect Phase 2 IVR — tenant=${TENANT_SLUG} (no DNID))
 same =>    n,Goto(_X!,1)

; Per-digit handlers. Each sets OPT_DIGIT and jumps to the shared resolver.
; Digits 0-9 map to their numeric string; * and # map to "star"/"hash" because
; AstDB keys can't safely contain those characters.
exten => 0,1,Set(OPT_DIGIT=0)
 same =>    n,Goto(connect-option-router,s,1)
exten => 1,1,Set(OPT_DIGIT=1)
 same =>    n,Goto(connect-option-router,s,1)
exten => 2,1,Set(OPT_DIGIT=2)
 same =>    n,Goto(connect-option-router,s,1)
exten => 3,1,Set(OPT_DIGIT=3)
 same =>    n,Goto(connect-option-router,s,1)
exten => 4,1,Set(OPT_DIGIT=4)
 same =>    n,Goto(connect-option-router,s,1)
exten => 5,1,Set(OPT_DIGIT=5)
 same =>    n,Goto(connect-option-router,s,1)
exten => 6,1,Set(OPT_DIGIT=6)
 same =>    n,Goto(connect-option-router,s,1)
exten => 7,1,Set(OPT_DIGIT=7)
 same =>    n,Goto(connect-option-router,s,1)
exten => 8,1,Set(OPT_DIGIT=8)
 same =>    n,Goto(connect-option-router,s,1)
exten => 9,1,Set(OPT_DIGIT=9)
 same =>    n,Goto(connect-option-router,s,1)
exten => *,1,Set(OPT_DIGIT=star)
 same =>    n,Goto(connect-option-router,s,1)
exten => #,1,Set(OPT_DIGIT=hash)
 same =>    n,Goto(connect-option-router,s,1)

; --- Direct-dial patterns (VitalPBX-parity) ---
; _XXX and _XXXX match 3- or 4-digit extensions. Asterisk's canmatch logic
; means that when the user types `1`, the exact-match handler above fires
; after the WaitExten timeout unless more digits follow fast enough — so
; single-digit options still work even with these patterns present.
;
; Gated by the direct_dial AstDB flag: if the tenant hasn't opted in we
; immediately fall through to the 'i' invalid handler, giving the pre-v2
; restricted-menu behavior.
;
; from-internal is VitalPBX's standard internal-extension context. Tenants
; are isolated at the inbound-route layer (TENANT_SLUG already picked the
; correct tenant); Connect's publish layer is responsible for making sure
; the extensions are the tenant's own, not cross-tenant.
exten => _XXX,1,NoOp(Connect IVR direct-dial candidate — tenant=${TENANT_SLUG} exten=${EXTEN})
 same =>      n,GotoIf($["${DIRECT_DIAL}" != "1"]?block)
 same =>      n,Goto(from-internal,${EXTEN},1)
 same =>      n(block),NoOp(Direct dial disabled for tenant — treating as invalid)
 same =>      n,Goto(i,1)
exten => _XXXX,1,NoOp(Connect IVR direct-dial candidate — tenant=${TENANT_SLUG} exten=${EXTEN})
 same =>       n,GotoIf($["${DIRECT_DIAL}" != "1"]?block)
 same =>       n,Goto(from-internal,${EXTEN},1)
 same =>       n(block),NoOp(Direct dial disabled for tenant — treating as invalid)
 same =>       n,Goto(i,1)

; 'i' = invalid extension (DTMF didn't match any handler). Play invalid prompt
; (if configured) and re-enter the loop. Once RETRIES >= R_MAX we route to
; dest_invalid if the admin has configured one, otherwise fall through to
; connect-default-fallback (pre-v2 behavior).
exten => i,1,NoOp(Connect IVR invalid digit — tenant=${TENANT_SLUG} retries=${RETRIES})
 same =>   n,Set(RETRIES=$[${RETRIES}+1])
 same =>   n,GotoIf($[${RETRIES} >= ${R_MAX}]?exhausted_invalid)
 same =>   n,GotoIf($["${INVALID_PROMPT}" = ""]?reprompt)
 same =>   n,NoOp(Connect IVR invalid prompt tenant=${TENANT_SLUG} ref=${INVALID_PROMPT})
 ; Same drift-proofing as the main greeting — missing invalid prompt file
 ; falls back to re-prompting immediately.
 same =>   n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${INVALID_PROMPT}.ulaw)}" = "1"]?play_invalid)
 same =>   n,GotoIf($["${STAT(e,/var/lib/asterisk/sounds/${INVALID_PROMPT}.wav)}" = "1"]?play_invalid)
 same =>   n,NoOp(Connect IVR invalid prompt missing ref=${INVALID_PROMPT} — reprompting)
 same =>   n,Goto(reprompt)
 same =>   n(play_invalid),Background(${INVALID_PROMPT})
 same =>   n(reprompt),Goto(connect-tenant-ivr,${EXTEN},prompt)
 same =>   n(exhausted_invalid),Set(EXIT_TYPE=${DB(${FAMILY}/dest_invalid_type)})
 same =>   n,Set(EXIT_DEST=${DB(${FAMILY}/dest_invalid)})
 same =>   n,GotoIf($["${EXIT_DEST}" = ""]?fallback)
 same =>   n,NoOp(IVR exhausted on invalid — routing tenant=${TENANT_SLUG} type=${EXIT_TYPE} dest=${EXIT_DEST})
 same =>   n,Goto(connect-exit-router,s,1)
 same =>   n(fallback),Goto(connect-default-fallback,s,1)

; 't' = timeout (handled inline in the main flow via WaitExten falling through,
; but provide this as a safety net if Asterisk routes a 't' here directly).
exten => t,1,Goto(connect-tenant-ivr,${EXTEN},prompt)

; ----------------------------------------------------------------------------
; [connect-option-router]
; Looks up opt_<digit>/dest in AstDB and Goto's it. Empty/missing digits land
; in connect-default-fallback so the call always terminates cleanly.
; ----------------------------------------------------------------------------

[connect-option-router]
exten => s,1,NoOp(Connect option router — tenant=${TENANT_SLUG} digit=${OPT_DIGIT})
 same =>    n,Set(OPT_DEST=${DB(connect/t_${TENANT_SLUG}/opt_${OPT_DIGIT}/dest)})
 same =>    n,Set(OPT_TYPE=${DB(connect/t_${TENANT_SLUG}/opt_${OPT_DIGIT}/type)})
 same =>    n,GotoIf($["${OPT_DEST}" = ""]?fallback)
 same =>    n,NoOp(Connect option routing tenant=${TENANT_SLUG} digit=${OPT_DIGIT} type=${OPT_TYPE} dest=${OPT_DEST})
 ; external_number type uses E.164 in the dest, not a CEP. Dial it via the
 ; tenant's outbound trunk if configured; otherwise fall through. Edit the
 ; Dial() string to match your PBX's outbound trunk name.
 same =>    n,GotoIf($["${OPT_TYPE}" = "external_number"]?extnum)
 same =>    n,Goto(${OPT_DEST})
 same =>    n(extnum),Dial(PJSIP/${OPT_DEST},30)
 same =>    n,Hangup()
 same =>    n(fallback),Goto(connect-default-fallback,s,1)

; ----------------------------------------------------------------------------
; [connect-exit-router]
; Generic "route to (type, value)" helper. Used by [connect-tenant-ivr] to
; exit the menu after max retries on either invalid or timeout. Reads the
; destination from channel variables EXIT_TYPE and EXIT_DEST (set by the
; caller immediately before Goto'ing here) so it can share one context for
; both exit paths.
;
; Channel variables expected:
;   EXIT_TYPE — module type string (extension, queue, ring_group, voicemail,
;               ivr, announcement, external_number, terminate, custom).
;               Metadata for logging + for the external_number branch.
;   EXIT_DEST — CEP string for everything except external_number, which uses
;               E.164 here.
; ----------------------------------------------------------------------------

[connect-exit-router]
exten => s,1,NoOp(Connect exit router — tenant=${TENANT_SLUG} type=${EXIT_TYPE} dest=${EXIT_DEST})
 same =>    n,GotoIf($["${EXIT_DEST}" = ""]?fallback)
 same =>    n,GotoIf($["${EXIT_TYPE}" = "terminate"]?hangup)
 same =>    n,GotoIf($["${EXIT_TYPE}" = "external_number"]?extnum)
 same =>    n,Goto(${EXIT_DEST})
 same =>    n(extnum),NoOp(Dialing external number ${EXIT_DEST})
 same =>    n,Dial(PJSIP/${EXIT_DEST},30)
 same =>    n,Hangup()
 same =>    n(hangup),NoOp(Terminate destination — hanging up)
 same =>    n,Hangup()
 same =>    n(fallback),Goto(connect-default-fallback,s,1)

; ============================================================================
; PHASE 3 — Dynamic hold announcements
;
; [connect-hold-announce] is a LOCAL-CHANNEL wrapper that loops a periodic
; announcement while a caller is queued or otherwise holding. Queues that want
; Connect-controlled announcements spawn a Local channel into this context via
; `member => Local/s@connect-hold-announce` style or by having the dialplan
; originate the Local channel explicitly. The wrapper reads HOLD_ANNOUNCE /
; HOLD_REPEAT (set earlier by [connect-tenant-ivr]) OR falls back to AstDB
; so it works even if entered directly.
;
; Runtime keys (all under connect/t_<slug>):
;   hold_announce  — recording ref (e.g. "custom/acme_hold_info"); empty = off
;   hold_repeat    — seconds between playbacks (default 30, minimum 10)
;
; Safety:
;   • Plays announcement once, waits HOLD_REPEAT seconds, loops until caller
;     is bridged / hangs up / is removed from the queue.
;   • Empty announcement → immediately Hangup() so the Local channel doesn't
;     hold a slot forever.
;   • Minimum 10s repeat is enforced to protect against misconfiguration.
; ============================================================================

[connect-hold-announce]
exten => s,1,NoOp(Connect hold announce — tenant=${TENANT_SLUG})
 same =>    n,GotoIf($["${TENANT_SLUG}" = ""]?hangup)
 same =>    n,Set(FAMILY=connect/t_${TENANT_SLUG})
 ; Fall back to AstDB if the channel variables weren't set by a prior context.
 same =>    n,ExecIf($["${HOLD_ANNOUNCE}" = ""]?Set(HOLD_ANNOUNCE=${DB(${FAMILY}/hold_announce)}))
 same =>    n,ExecIf($["${HOLD_REPEAT}" = ""]?Set(HOLD_REPEAT=${DB(${FAMILY}/hold_repeat)}))
 same =>    n,Set(HOLD_REPEAT=${IF($[${LEN(${HOLD_REPEAT})}>0]?${HOLD_REPEAT}:30)})
 ; Enforce minimum interval so a 0/1-second misconfiguration doesn't DoS the queue.
 same =>    n,ExecIf($[${HOLD_REPEAT} < 10]?Set(HOLD_REPEAT=10))
 same =>    n,GotoIf($["${HOLD_ANNOUNCE}" = ""]?hangup)
 same =>    n,Answer()
 same =>    n(loop),Playback(${HOLD_ANNOUNCE})
 same =>    n,Wait(${HOLD_REPEAT})
 same =>    n,Goto(loop)
 same =>    n(hangup),Hangup()
