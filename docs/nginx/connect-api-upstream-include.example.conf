# Example: include-driven active API backend for blue/green deploys.
#
# 1) Copy connect-api-upstream-active.snippet once to the host, e.g.
#    /opt/connectcomms/nginx/connect-api-upstream-active.conf
#    with content:   server 127.0.0.1:3001;
#
# 2) In the server block that proxies /api, define upstream:
#
#    upstream connect_api_active {
#      include /opt/connectcomms/nginx/connect-api-upstream-active.conf;
#    }
#
#    location /api/ {
#      proxy_pass http://connect_api_active;
#      ...
#    }
#
# The deploy queue (scripts/deploy-api.sh) rewrites the include file to port
# 3004 (candidate) then back to 3001 (stable) during rollout.
#
# Operators must ensure nginx can read the path and the deploy user can
# rewrite it (typically group-writable + deploy user in that group, or sudo).

upstream connect_api_active {
  include /opt/connectcomms/nginx/connect-api-upstream-active.conf;
}
