# Example: include-driven active Portal (Next.js) backend for blue/green deploys.
#
# 1) Copy connect-portal-upstream-active.snippet to the host, e.g.
#    /opt/connectcomms/nginx/connect-portal-upstream-active.conf
#    with content:   server 127.0.0.1:3000;
#
# 2) In the server block that proxies the HTML app (typically `location /`),
#    point `proxy_pass` at an upstream:
#
#    upstream connect_portal_active {
#      include /opt/connectcomms/nginx/connect-portal-upstream-active.conf;
#    }
#
#    location / {
#      proxy_pass http://connect_portal_active;
#      ...
#    }
#
# Scripts rewrite the include to port 3005 (portal_candidate) during rollout, then
# back to 3000 (stable portal). Keep API `location /api/` on `connect_api_active`
# as a separate upstream (unchanged).
#
# Operator must ensure nginx can read the path and the deploy user can rewrite it.

upstream connect_portal_active {
  include /opt/connectcomms/nginx/connect-portal-upstream-active.conf;
}
