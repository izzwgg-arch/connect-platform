services:
  kamailio:
    image: kamailio/kamailio-ci
    container_name: sbc-kamailio
    restart: unless-stopped
    depends_on:
      - rtpengine
    environment:
      SBC_DOMAIN: ${SBC_DOMAIN:-sbc.connectcomunications.local}
      SBC_PBX_HOST: ${SBC_PBX_HOST:-pbx}
      SBC_PBX_PORT: ${SBC_PBX_PORT:-5060}
      SBC_RTPENGINE_CTRL: ${SBC_RTPENGINE_CTRL:-udp:rtpengine:2223}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/letsencrypt/live/app.connectcomunications.com/fullchain.pem}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/letsencrypt/live/app.connectcomunications.com/privkey.pem}
    volumes:
      - ./infra/sbc/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./infra/sbc/kamailio/start.sh:/usr/local/bin/sbc-kamailio-start.sh:ro
      - ./infra/sbc/kamailio/tls.cfg:/etc/kamailio/tls.cfg:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/sbc-kamailio-start.sh"]
    ports:
      - "127.0.0.1:5060:5060/udp"
      - "127.0.0.1:5061:5061/tcp"
      - "127.0.0.1:7443:7443/tcp"
    networks:
      - sbc_net
      - app_net

  rtpengine:
    image: drachtio/rtpengine
    container_name: sbc-rtpengine
    restart: unless-stopped
    command:
      - rtpengine
      - --foreground
      - --log-level=6
      - --listen-ng=0.0.0.0:2223
      - --interface=eth0
      - --port-min=30000
      - --port-max=40000
      - --table=0
      - --tos=184
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    expose:
      - "2223/udp"
      - "30000-40000/udp"
    networks:
      - sbc_net

networks:
  sbc_net:
    name: sbc_net
    driver: bridge
  app_net:
    external: true
    name: app_default
