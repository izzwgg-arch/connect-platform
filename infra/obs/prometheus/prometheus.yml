global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    platform: connect

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:

  # ── Connect API (Fastify) ─────────────────────────────────────────────────
  - job_name: connect_api
    static_configs:
      - targets: ["api:3001"]
        labels:
          service: api
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Connect Telephony (Express) ───────────────────────────────────────────
  - job_name: connect_telephony
    static_configs:
      - targets: ["telephony:3003"]
        labels:
          service: telephony
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
