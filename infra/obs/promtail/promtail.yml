server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Connect platform containers ───────────────────────────────────────────
  - job_name: connect_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: name
            values:
              - app-api-1
              - app-telephony-1
              - app-portal-1
              - app-worker-1

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.*)"
        target_label: container
      - source_labels: [container]
        regex: "app-api-.*"
        target_label: service
        replacement: api
      - source_labels: [container]
        regex: "app-telephony-.*"
        target_label: service
        replacement: telephony
      - source_labels: [container]
        regex: "app-portal-.*"
        target_label: service
        replacement: portal
      - source_labels: [container]
        regex: "app-worker-.*"
        target_label: service
        replacement: worker
      - target_label: platform
        replacement: connect
      - target_label: environment
        replacement: production

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            callId: callId
            tenantId: tenantId
            userId: userId
            direction: direction
            event_type: event_type
            linkedId: linkedId
            err_message: "err.message"
      - template:
          source: level
          template: |
            {{ if eq .Value "10" }}trace
            {{ else if eq .Value "20" }}debug
            {{ else if eq .Value "30" }}info
            {{ else if eq .Value "40" }}warn
            {{ else if eq .Value "50" }}error
            {{ else if eq .Value "60" }}fatal
            {{ else }}{{ .Value }}
            {{ end }}
      - labels:
          level:
          service:
          tenantId:
          direction:
          event_type:
      - drop:
          expression: '.*GET /health.*'
          drop_counter_reason: health_check_noise

  # ── SBC containers (Kamailio) if running ─────────────────────────────────
  - job_name: connect_sbc
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: name
            values:
              - sbc-kamailio
              - sbc-rtpengine
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.*)"
        target_label: container
      - target_label: service
        replacement: sbc
      - target_label: platform
        replacement: connect
    pipeline_stages:
      - labels:
          container:
