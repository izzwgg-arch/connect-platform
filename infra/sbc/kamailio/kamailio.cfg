#!KAMAILIO

#!define WITH_TLS
#!define WITH_WEBSOCKETS

enable_tls=yes

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sanity.so"
loadmodule "xlog.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "pv.so"
loadmodule "dispatcher.so"
loadmodule "rtpengine.so"
loadmodule "topoh.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "tls.so"
loadmodule "websocket.so"
loadmodule "xhttp.so"

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5061
listen=tls:0.0.0.0:7443

alias="sbc.connectcomunications.local"

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("topoh", "mask_key", "connect-sbc-topoh-key")
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)
modparam("htable", "htable", "flood=>size=8;autoexpire=120")
modparam("tls", "config", "/etc/kamailio/tls.cfg")
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:2223")

request_route {
  if (!mf_process_maxfwd_header("16")) {
    sl_send_reply("483", "Too Many Hops");
    exit;
  }

  if (!sanity_check("1511", "7")) {
    xlog("L_WARN", "sanity check failed from $si:$sp\n");
    sl_send_reply("400", "Bad Request");
    exit;
  }

  if (!pike_check_req()) {
    xlog("L_WARN", "flood blocked from $si\n");
    sl_send_reply("429", "Too Many Requests");
    exit;
  }

  xlog("L_INFO", "sbc request $rm $ru from $si:$sp\n");

  if (is_method("OPTIONS") && uri==myself) {
    xlog("L_INFO", "keepalive OPTIONS handled locally\n");
    sl_send_reply("200", "Keepalive");
    exit;
  }

  if (is_method("INVITE|SUBSCRIBE")) {
    record_route();
    rtpengine_manage("replace-origin replace-session-connection ICE=force RTP/AVP");
  }

  if (is_method("REGISTER")) {
    if (!ds_select_dst("1", "4")) {
      sl_send_reply("503", "PBX Unavailable");
      exit;
    }
    xlog("L_INFO", "relay REGISTER to PBX: $du\n");
    route(RELAY);
    exit;
  }

  if (is_method("INVITE|ACK|BYE|CANCEL|UPDATE|OPTIONS|INFO|PRACK|MESSAGE")) {
    if (!ds_select_dst("1", "4")) {
      sl_send_reply("503", "PBX Unavailable");
      exit;
    }
    xlog("L_INFO", "relay request to PBX: $rm $du\n");
    route(RELAY);
    exit;
  }

  sl_send_reply("405", "Method Not Allowed");
}

route[RELAY] {
  if (!t_relay()) {
    sl_reply_error();
  }
  exit;
}

onreply_route {
  if (is_method("INVITE") && status=~"[12][0-9][0-9]") {
    rtpengine_manage("replace-origin replace-session-connection ICE=force RTP/AVP");
  }
}

event_route[xhttp:request] {
  if ($Rp == 7443) {
    if ($hdr(Upgrade)=~"websocket" && $rm=="GET") {
      if (ws_handle_handshake()) {
        exit;
      }
    }
  }
  xhttp_reply("404", "Not Found", "text/plain", "Not Found");
}
