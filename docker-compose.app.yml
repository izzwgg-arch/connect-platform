services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    environment:
      SIMULATE_NUMBER_PROVIDER: ${SIMULATE_NUMBER_PROVIDER:-false}
      SOLA_CARDKNOX_SIMULATE: ${SOLA_CARDKNOX_SIMULATE:-false}
      SOLA_CARDKNOX_MODE: ${SOLA_CARDKNOX_MODE:-sandbox}
      SOLA_CARDKNOX_API_BASE_URL: ${SOLA_CARDKNOX_API_BASE_URL:-}
      SOLA_CARDKNOX_API_KEY: ${SOLA_CARDKNOX_API_KEY:-}
      SOLA_CARDKNOX_API_SECRET: ${SOLA_CARDKNOX_API_SECRET:-}
      SOLA_CARDKNOX_WEBHOOK_SECRET: ${SOLA_CARDKNOX_WEBHOOK_SECRET:-}
      PBX_SIMULATE: ${PBX_SIMULATE:-false}
      PBX_BASE_URL: ${PBX_BASE_URL:-}
      PBX_API_TOKEN: ${PBX_API_TOKEN:-}
      PBX_API_SECRET: ${PBX_API_SECRET:-}
      PBX_TIMEOUT_MS: ${PBX_TIMEOUT_MS:-10000}
      # IANA timezone for "today" KPI. Defaults to America/New_York; override via .env.platform or host shell.
      PBX_TIMEZONE: ${PBX_TIMEZONE:-America/New_York}
      # Confirmed WSS endpoint on this PBX build. Override in .env.platform if different.
      PBX_WS_ENDPOINT: ${PBX_WS_ENDPOINT:-wss://209.145.60.79:8089/ws}
      # STUN server — used as fallback ICE when tenant has no custom ICE servers
      STUN_SERVER: ${STUN_SERVER:-stun:stun.l.google.com:19302}
      # TURN server — set in .env.platform for production audio behind strict NAT
      # TURN_AUTH_SECRET enables HMAC time-limited credentials (use-auth-secret mode, recommended).
      # If set, TURN_USERNAME and TURN_PASSWORD are ignored.
      TURN_SERVER: ${TURN_SERVER:-}
      TURN_AUTH_SECRET: ${TURN_AUTH_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      # Internal URL for /voice/webrtc/health to fetch AMI/ARI status from telephony service
      TELEPHONY_INTERNAL_URL: ${TELEPHONY_INTERNAL_URL:-http://telephony:3003}
      PBX_WEBHOOK_VERIFY_MODE: ${PBX_WEBHOOK_VERIFY_MODE:-token}
      PBX_WEBHOOK_TOKEN: ${PBX_WEBHOOK_TOKEN:-}
      PBX_WEBHOOK_SIGNATURE_SECRET: ${PBX_WEBHOOK_SIGNATURE_SECRET:-}
      PBX_WEBHOOK_ALLOWED_IPS: ${PBX_WEBHOOK_ALLOWED_IPS:-}
      PBX_WEBHOOK_REGISTER_PATH: ${PBX_WEBHOOK_REGISTER_PATH:-}
      PBX_WEBHOOK_LIST_PATH: ${PBX_WEBHOOK_LIST_PATH:-}
      PBX_WEBHOOK_DELETE_PATH: ${PBX_WEBHOOK_DELETE_PATH:-}
      PBX_ACTIVE_CALLS_PATH: ${PBX_ACTIVE_CALLS_PATH:-}
      PBX_SUPPORTS_WEBHOOKS: ${PBX_SUPPORTS_WEBHOOKS:-false}
      PBX_SUPPORTS_ACTIVE_CALL_POLLING: ${PBX_SUPPORTS_ACTIVE_CALL_POLLING:-false}
      PBX_WEBHOOK_EVENT_TYPES: ${PBX_WEBHOOK_EVENT_TYPES:-}
      EXPO_PUSH_ACCESS_TOKEN: ${EXPO_PUSH_ACCESS_TOKEN:-}
      MOBILE_PUSH_SIMULATE: ${MOBILE_PUSH_SIMULATE:-false}
      VOICE_SIMULATE: ${VOICE_SIMULATE:-false}
      # Shared secret for /internal/cdr-ingest — must match telephony service CDR_INGEST_SECRET.
      CDR_INGEST_SECRET: ${CDR_INGEST_SECRET:-}
    command: sh -lc "pnpm --filter @connect/db exec prisma generate --schema prisma/schema.prisma && pnpm --filter @connect/db exec prisma migrate deploy --schema prisma/schema.prisma && pnpm --filter @connect/api dev"
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - default
      - infra_default

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    environment:
      # Empty = browser uses same-origin `/api` (works for every hostname nginx serves; avoids
      # hard-coding one domain when users open an alternate spelling/alias host).
      # Local dev: set NEXT_PUBLIC_API_URL=http://localhost:3001 in apps/portal/.env.local
      NEXT_PUBLIC_API_URL: ""
      # Server-side fetches from the portal container (if any) reach the API service directly.
      PORTAL_API_INTERNAL_URL: http://api:3001
      # Live AMI event stream for call/extension/queue state in the portal dashboard.
      # Must be wss:// in production (nginx proxies wss: → ws: internally).
      NEXT_PUBLIC_TELEPHONY_WS_URL: ${NEXT_PUBLIC_TELEPHONY_WS_URL:-wss://app.connectcomunications.com/ws/telephony}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - default

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - default

  telephony:
    build:
      context: .
      dockerfile: apps/telephony/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    environment:
      # Non-secret defaults only. Secrets (JWT_SECRET, AMI_PASSWORD, ARI_PASSWORD)
      # are read directly from env_file — do NOT override them here or the
      # empty shell-substitution will win over the file value.
      PORT: ${TELEPHONY_PORT:-3003}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PBX_HOST: ${PBX_HOST:-209.145.60.79}
      AMI_PORT: ${AMI_PORT:-5038}
      AMI_USERNAME: ${AMI_USERNAME:-connectcommsgefenu}
      ARI_BASE_URL: ${ARI_BASE_URL:-http://209.145.60.79:8088}
      ARI_USERNAME: ${ARI_USERNAME:-connectcomms}
      ARI_APP_NAME: ${ARI_APP_NAME:-connectcomms}
      TELEPHONY_WS_PATH: ${TELEPHONY_WS_PATH:-/ws/telephony}
      TELEPHONY_SNAPSHOT_INTERVAL_MS: ${TELEPHONY_SNAPSHOT_INTERVAL_MS:-5000}
      TELEPHONY_EVENT_DEBOUNCE_MS: ${TELEPHONY_EVENT_DEBOUNCE_MS:-100}
      ENABLE_TELEPHONY_DEBUG: ${ENABLE_TELEPHONY_DEBUG:-false}
      # CDR persistence: telephony POSTs completed calls to the API for DB storage.
      CDR_INGEST_URL: ${CDR_INGEST_URL:-http://api:3001/internal/cdr-ingest}
      CDR_INGEST_SECRET: ${CDR_INGEST_SECRET:-}
    ports:
      - "127.0.0.1:3003:3003"
    networks:
      - default
      - infra_default

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    environment:
      SMS_PROVIDER: ${SMS_PROVIDER:-fake}
      SIMULATE_PROVIDER_FAILURE_TWILIO: ${SIMULATE_PROVIDER_FAILURE_TWILIO:-false}
      SIMULATE_PROVIDER_FAILURE_VOIPMS: ${SIMULATE_PROVIDER_FAILURE_VOIPMS:-false}
      SIMULATE_NUMBER_PROVIDER: ${SIMULATE_NUMBER_PROVIDER:-false}
      SOLA_CARDKNOX_SIMULATE: ${SOLA_CARDKNOX_SIMULATE:-false}
      SOLA_CARDKNOX_MODE: ${SOLA_CARDKNOX_MODE:-sandbox}
      SOLA_CARDKNOX_API_BASE_URL: ${SOLA_CARDKNOX_API_BASE_URL:-}
      SOLA_CARDKNOX_API_KEY: ${SOLA_CARDKNOX_API_KEY:-}
      SOLA_CARDKNOX_API_SECRET: ${SOLA_CARDKNOX_API_SECRET:-}
      SOLA_CARDKNOX_WEBHOOK_SECRET: ${SOLA_CARDKNOX_WEBHOOK_SECRET:-}
      PBX_SIMULATE: ${PBX_SIMULATE:-false}
      PBX_BASE_URL: ${PBX_BASE_URL:-}
      PBX_API_TOKEN: ${PBX_API_TOKEN:-}
      PBX_API_SECRET: ${PBX_API_SECRET:-}
      PBX_TIMEOUT_MS: ${PBX_TIMEOUT_MS:-10000}
      PBX_WS_ENDPOINT: ${PBX_WS_ENDPOINT:-wss://209.145.60.79:8089/ws}
      STUN_SERVER: ${STUN_SERVER:-stun:stun.l.google.com:19302}
      TURN_SERVER: ${TURN_SERVER:-}
      TURN_AUTH_SECRET: ${TURN_AUTH_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_PASSWORD: ${TURN_PASSWORD:-}
      PBX_WEBHOOK_VERIFY_MODE: ${PBX_WEBHOOK_VERIFY_MODE:-token}
      PBX_WEBHOOK_TOKEN: ${PBX_WEBHOOK_TOKEN:-}
      PBX_WEBHOOK_SIGNATURE_SECRET: ${PBX_WEBHOOK_SIGNATURE_SECRET:-}
      PBX_WEBHOOK_ALLOWED_IPS: ${PBX_WEBHOOK_ALLOWED_IPS:-}
      PBX_ACTIVE_CALLS_PATH: ${PBX_ACTIVE_CALLS_PATH:-}
      PBX_SUPPORTS_WEBHOOKS: ${PBX_SUPPORTS_WEBHOOKS:-false}
      PBX_SUPPORTS_ACTIVE_CALL_POLLING: ${PBX_SUPPORTS_ACTIVE_CALL_POLLING:-false}
      PBX_WEBHOOK_EVENT_TYPES: ${PBX_WEBHOOK_EVENT_TYPES:-}
      EXPO_PUSH_ACCESS_TOKEN: ${EXPO_PUSH_ACCESS_TOKEN:-}
      MOBILE_PUSH_SIMULATE: ${MOBILE_PUSH_SIMULATE:-false}
      VOICE_SIMULATE: ${VOICE_SIMULATE:-false}
    networks:
      - default
      - infra_default

networks:
  infra_default:
    external: true
