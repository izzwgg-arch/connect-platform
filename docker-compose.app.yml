services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    environment:
      SIMULATE_NUMBER_PROVIDER: ${SIMULATE_NUMBER_PROVIDER:-false}
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - default
      - infra_default

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: https://app.connectcomunications.com/api
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - default

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - default

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - /opt/connectcomms/env/.env.platform
    environment:
      SMS_PROVIDER: ${SMS_PROVIDER:-fake}
      SIMULATE_PROVIDER_FAILURE_TWILIO: ${SIMULATE_PROVIDER_FAILURE_TWILIO:-false}
      SIMULATE_PROVIDER_FAILURE_VOIPMS: ${SIMULATE_PROVIDER_FAILURE_VOIPMS:-false}
      SIMULATE_NUMBER_PROVIDER: ${SIMULATE_NUMBER_PROVIDER:-false}
    networks:
      - default
      - infra_default

networks:
  infra_default:
    external: true
